# Coastal Corridor Briefing Standard — inherits _core (ADR-0001, 0013, 0015)
standard: coastal_corridor
version: "0.3"
name: Coastal Corridor Briefing Standard
applies_to: linear shoreline infrastructure (highway · rail · causeway), mixed rural-urban segments
extends: _core_sections               # <-- all _core sections + citation policy inherited
riders:                               # type-specific sections added to _core
