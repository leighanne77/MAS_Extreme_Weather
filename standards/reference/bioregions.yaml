# Global bioregion reference — reuse-first (NO invented taxonomy)
# The stable top levels are enumerated here; the full per-bioregion list is a
# SOURCE_PULL from the cited datasets (846 ecoregions / 185 bioregions are not
# hand-typed — that would be fabrication). Binds bioregion -> watershed (HUC).
schema: bioregion_reference
version: "0.1"
status: framework + source-pull
definition: >
  MAS bioregion = a biogeographically coherent area, operationalized as a WATERSHED
  (MAS's own definition, 0.71 India doc). US start: identity from EPA/CEC Omernik ecoregions
  (below); global framework = One Earth / RESOLVE (kept for expansion). Watershed binding
  (USGS HUC) gives hydrologic boundaries.
scope:
  current: US-only (site-of-sites is US-only). Global One Earth/RESOLVE framework retained below for later expansion.
  us_working_taxonomy: EPA/CEC Omernik Ecoregions — federal (customer's own) standard, HUC-alignable

# ── US-NATIVE PRIMARY (start here) ──
us_ecoregions:
  name: EPA Ecoregions of North America (Omernik) — co-published by the CEC (trinational)
  robustness: CEC co-publication makes it resilient to US-federal-only changes (cf. ADR-0009)
  continuity: trusted-exception   # escrow + checksum on pull
  urls:
    overview: https://www.epa.gov/eco-research/ecoregions-north-america
    data_conus: https://www.epa.gov/eco-research/level-iii-and-iv-ecoregions-continental-united-states
  levels:
    level_I:   {count: 15, status: enumerated_below, use: coarse bioregion roll-up}
    level_II:  {count: ~50, status: source_pull}
    level_III: {count: 105 (CONUS), status: source_pull, use: WORKING GRANULARITY for US Briefs}
    level_IV:  {count: ~967 (CONUS), status: source_pull, use: fine detail where needed}
  level_I_ecoregions:            # 15 — stable (CEC/EPA), the enumerable top for the US
    - Arctic Cordillera
    - Tundra
    - Taiga
    - Hudson Plains
    - Northern Forests
    - Northwestern Forested Mountains
    - Marine West Coast Forest
    - Eastern Temperate Forests
    - Great Plains
    - North American Deserts
    - Mediterranean California
    - Southern Semiarid Highlands
    - Temperate Sierras
    - Tropical Dry Forests
    - Tropical Wet Forests
  us_bioregion_estimate: One Earth Nearctic bioregions within US borders ~35 (crosswalk retained; not the working unit)


global_sources:   # EXPANSION-ONLY — not used while US-only
  terrestrial_bioregions:
    name: One Earth Bioregions Framework (185 bioregions)
    built_on: RESOLVE Ecoregions 2017 — 846 terrestrial ecoregions (Dinerstein et al. 2017, BioScience "An Ecoregion-Based Approach to Protecting Half the Terrestrial Realm")
    url: https://www.oneearth.org/bioregions-2023/
    data: https://ecoregions.appspot.com/            # RESOLVE Ecoregions 2017 GeoJSON/shapefile
    license: CC-BY-4.0
    preference: p1-preferenced
  freshwater:
    name: Freshwater Ecoregions of the World (FEOW) — 426 drainage-basin units
    note: closest framework to MAS's watershed = bioregion definition
    url: https://www.feow.org/
  marine:
    name: Marine Ecoregions of the World (MEOW) — 232 ecoregions (Spalding et al. 2007)
    note: for coastal/estuarine sites (SR-37, Mobile)
    url: https://www.worldwildlife.org/publications/marine-ecoregions-of-the-world-a-bioregionalization-of-coastal-and-shelf-areas
  watershed_binding_us:
    name: USGS Watershed Boundary Dataset (WBD) — Hydrologic Unit Codes HUC-2..HUC-12
    url: https://www.usgs.gov/national-hydrography/watershed-boundary-dataset
    continuity: trusted-exception   # federal reference; escrow + checksum on pull
  watershed_binding_global:
    name: HydroBASINS / HydroSHEDS — Pfafstetter-coded nested basins (the global HUC-equivalent)
    url: https://www.hydrosheds.org/products/hydrobasins
  ecosystem_setting:
    name: ENVO environmental settings (via EBI OLS4) + CICES ecosystem-service classes
    note: already the ecological-register authorities in standards/ontology/sites.ttl (eve:EcosystemService)

hierarchy: [realm, biome, bioregion, ecoregion]   # One Earth nesting

biogeographic_realms:            # 8 — stable (WWF/RESOLVE)
  [Nearctic, Neotropical, Palearctic, Afrotropical, IndoMalayan, Australasian, Oceanian, Antarctic]

biomes:                          # 14 terrestrial — stable (WWF/RESOLVE)
  - Tropical & Subtropical Moist Broadleaf Forests
  - Tropical & Subtropical Dry Broadleaf Forests
  - Tropical & Subtropical Coniferous Forests
  - Temperate Broadleaf & Mixed Forests
  - Temperate Conifer Forests
  - Boreal Forests / Taiga
  - Tropical & Subtropical Grasslands, Savannas & Shrublands
  - Temperate Grasslands, Savannas & Shrublands
  - Flooded Grasslands & Savannas
  - Montane Grasslands & Shrublands
  - Tundra
  - Mediterranean Forests, Woodlands & Scrub
  - Deserts & Xeric Shrublands
  - Mangroves

full_enumeration:
  scope_now: US only — EPA Level III (105 CONUS) is the working pull, not 846 global
  status: SOURCE_PULL            # not hand-typed here (fabrication risk)
  terrestrial: 185 bioregions / 846 ecoregions — pull RESOLVE Ecoregions 2017 (ecoregions.appspot.com GeoJSON)
  on_pull: escrow the dataset (data/curated/bioregions/) + checksum in the escrow manifest (F4)

binding_scheme:
  method: spatial intersection of the bioregion/ecoregion polygon with the watershed polygon
  us: bioregion ∩ USGS HUC-8 / HUC-12 (WBD)
  global: bioregion ∩ HydroBASINS level 6–8
  cardinality: many-to-many — a bioregion spans many watersheds; a watershed can touch >1 ecoregion. Record the overlap set, never force 1:1.

